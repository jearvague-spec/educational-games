<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Animals</title>
    <style>
        :root {
            /* Azul profesional oscuro */
            --bg-color: #075985; 
            --bg-gradient: radial-gradient(circle, #0c4a6e 0%, #075985 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --text-light: #f0f9ff;
            --match-yellow: #fde047; /* Amarillo para aciertos */
        }

        body {
            background: var(--bg-gradient);
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            background: var(--glass-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 800px;
        }

        h1 { text-align: center; margin-bottom: 20px; color: var(--text-light); }

        table { border-spacing: 10px; }

        button {
            height: 90px;
            width: 90px;
            font-size: 18px;
            color: #1e293b;
            font-weight: bold;
            background: #f8fafc;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: capitalize;
        }

        button:hover { 
            transform: scale(1.05); 
            background: #fff; 
        }
        
        /* Clase para el par correcto (Amarillo) */
        button.correct {
            background-color: var(--match-yellow) !important;
            color: #854d0e !important;
            border-color: #eab308 !important;
            cursor: default;
            transform: scale(1.02);
        }

        button:disabled:not(.correct) { 
            background: #cbd5e1; 
            color: #64748b;
            cursor: default; 
            transform: none; 
            border-color: transparent;
        }

        .section2 {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 180px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .estadisticas {
            border: 2px solid var(--match-yellow);
            border-radius: 8px;
            padding: 10px;
            font-size: 1.3rem;
            color: var(--match-yellow);
            margin: 0;
        }

        footer { 
            margin-top: 40px; 
            text-align: center; 
            color: var(--text-light);
            font-size: 0.9rem;
        }
        footer a { color: var(--match-yellow); text-decoration: underline; font-weight: bold; }
    </style>
</head>

<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <h1>Memory Game - Animals</h1>

    <main>
        <section class="section1">
            <table>
                <tr>
                    <td><button id="0" onclick="destapar(0)"></button></td>
                    <td><button id="1" onclick="destapar(1)"></button></td>
                    <td><button id="2" onclick="destapar(2)"></button></td>
                    <td><button id="3" onclick="destapar(3)"></button></td>
                </tr>
                <tr>
                    <td><button id="4" onclick="destapar(4)"></button></td>
                    <td><button id="5" onclick="destapar(5)"></button></td>
                    <td><button id="6" onclick="destapar(6)"></button></td>
                    <td><button id="7" onclick="destapar(7)"></button></td>
                </tr>
                <tr>
                    <td><button id="8" onclick="destapar(8)"></button></td>
                    <td><button id="9" onclick="destapar(9)"></button></td>
                    <td><button id="10" onclick="destapar(10)"></button></td>
                    <td><button id="11" onclick="destapar(11)"></button></td>
                </tr>
                <tr>
                    <td><button id="12" onclick="destapar(12)"></button></td>
                    <td><button id="13" onclick="destapar(13)"></button></td>
                    <td><button id="14" onclick="destapar(14)"></button></td>
                    <td><button id="15" onclick="destapar(15)"></button></td>
                </tr>
            </table>
        </section>

        <section class="section2">
            <h2 id="aciertos" class="estadisticas">Matches: 0</h2>
        </section>
    </main>

    <footer>
        <p>Game programmed by <a href="#">JAVG</a> | EdTech Support</p>
    </footer>

    <script>
        let tarjetasDestapadas = 0;
        let tarjeta1 = null;
        let tarjeta2 = null;
        let primerResultado = null;
        let segundoResultado = null;
        let aciertos = 0;

        let mostrarAciertos = document.getElementById('aciertos');

        let numeros = ["dog","dog","cat","cat","bee","bee","fly","fly","cow","cow","sheep","sheep","bird","bird","frog","frog"];
        numeros = numeros.sort(() => { return Math.random() - 0.5 });

        function destapar(id) {
            tarjetasDestapadas++;

            if (tarjetasDestapadas == 1) {
                tarjeta1 = document.getElementById(id);
                primerResultado = numeros[id];
                tarjeta1.innerHTML = primerResultado;
                tarjeta1.disabled = true;
            } else if (tarjetasDestapadas == 2) {
                tarjeta2 = document.getElementById(id);
                segundoResultado = numeros[id];
                tarjeta2.innerHTML = segundoResultado;
                tarjeta2.disabled = true;

                if (primerResultado == segundoResultado) {
                    // Coincidencia encontrada
                    tarjeta1.classList.add('correct');
                    tarjeta2.classList.add('correct');
                    
                    tarjetasDestapadas = 0;
                    aciertos++;
                    mostrarAciertos.innerHTML = `Matches: ${aciertos}`;

                    if (aciertos == 8) {
                        mostrarAciertos.innerHTML = `Matches: ${aciertos} ⭐ Win!`;
                    }
                } else {
                    // No coinciden, ocultar de nuevo
                    setTimeout(() => {
                        tarjeta1.innerHTML = ' ';
                        tarjeta2.innerHTML = ' ';
                        tarjeta1.disabled = false;
                        tarjeta2.disabled = false;
                        tarjetasDestapadas = 0;
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
