<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do the operation from left to right</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #7ED321; /* 🍏 Apple green */
            --fail-color: #e67e22;
            --bg-color: #f4f4f9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.8rem;
        }

        .selector-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .selector-container label {
            font-weight: bold;
            color: var(--text-color);
        }

        .selector-container select {
            padding: 8px 15px;
            font-size: 1rem;
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            background-color: white;
            cursor: pointer;
            outline: none;
        }

        .selector-container select:hover {
            background-color: #e8f4fc;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            width: 320px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .score-ok { color: var(--success-color); }
        .score-fail { color: var(--fail-color); }

        .target-display {
            background: white;
            border: 2px solid var(--primary-color);
            padding: 15px 30px;
            font-size: 2.5rem;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 100px;
            text-align: center;
        }

        .matrix-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #eee;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            font-weight: bold;
        }

        .cell:hover {
            background-color: #ddd;
            transform: scale(1.05);
        }

        .cell.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .cell.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: var(--success-color);
            transition: none;
        }

        .cell.wrong {
            background-color: var(--fail-color) !important;
            color: white;
            border-color: var(--fail-color);
        }

        .col-operators .cell {
            background-color: #e8f4fc;
        }

        .feedback-box {
            height: 50px;
            width: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            transition: background-color 0.3s, color 0.3s;
        }

        .feedback-good {
            background-color: var(--success-color);
            color: white;
        }

        .feedback-try {
            background-color: var(--fail-color);
            color: white;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 150px;
        }

        #next-btn {
            background-color: var(--primary-color);
            color: white;
        }
        #next-btn:hover { background-color: #2980b9; }
        #next-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        #restart-btn {
            background-color: #9b59b6;
            color: white;
        }
        #restart-btn:hover { background-color: #8e44ad; }

        #close-btn {
            background-color: #e74c3c;
            color: white;
        }
        #close-btn:hover { background-color: #c0392b; }

    </style>
</head>
<body>

    <h1>Do the operation from left to right</h1>

    <div class="selector-container">
        <label for="digit-selector">Range:</label>
        <select id="digit-selector" onchange="initGame()">
            <option value="1">0 - 12</option>
            <option value="2">0 - 100</option>
        </select>
    </div>

    <div class="scoreboard">
        <span class="score-ok">OK: <span id="ok-count">0</span></span>
        <span class="score-fail">Fails: <span id="fail-count">0</span></span>
    </div>

    <div class="target-display" id="target-number">?</div>

    <div class="matrix-container" id="matrix"></div>

    <div class="feedback-box" id="feedback-text">Select numbers to start</div>

    <!-- Button Group -->
    <div class="button-container">
        <button id="next-btn" onclick="initGame()">Next</button>
        <button id="restart-btn" onclick="restartGame()">Restart</button>
        <button id="close-btn" onclick="closeGame()">Close</button>
    </div>

    <script>
        let okCount = 0;
        let failCount = 0;
        let targetValue = 0;
        let selectedCol1 = null;
        let selectedOp = null;
        let selectedCol3 = null;
        
        const matrixEl = document.getElementById('matrix');
        const targetEl = document.getElementById('target-number');
        const feedbackEl = document.getElementById('feedback-text');
        const okCountEl = document.getElementById('ok-count');
        const failCountEl = document.getElementById('fail-count');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const closeBtn = document.getElementById('close-btn');
        const digitSelector = document.getElementById('digit-selector');

        window.onload = initGame;

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Función para mezclar un array (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getDigitRange() {
            const digits = digitSelector.value;
            if (digits === '1') {
                return { min1: 0, max1: 12, min2: 0, max2: 12 };
            } else {
                return { min1: 0, max1: 100, min2: 0, max2: 100 };
            }
        }

        function calculate(n1, op, n2) {
            switch(op) {
                case '+': return n1 + n2;
                case '-': return n1 - n2;
                case '×': return n1 * n2;
                case '/': return n2 !== 0 ? n1 / n2 : NaN;
                default: return 0;
            }
        }

        function generateGuaranteedSolution(range) {
            // Intentamos encontrar una operación válida aleatoria
            const operators = ['+', '-', '×', '/'];
            let attempts = 0;
            
            while (attempts < 500) {
                const op = operators[getRandomInt(0, 3)];
                let n1 = getRandomInt(range.min1, range.max1);
                let n2 = getRandomInt(range.min2, range.max2);
                
                // Validaciones estrictas
                if (op === '/' && (n2 === 0 || n1 % n2 !== 0)) {
                    attempts++;
                    continue;
                }
                if (op === '-' && n1 < n2) {
                    attempts++;
                    continue;
                }
                
                const result = calculate(n1, op, n2);
                
                if (Number.isInteger(result) && result >= 0 && !isNaN(result)) {
                    return { n1, op, n2, result };
                }
                attempts++;
            }
            
            // Fallback seguro: suma simple si falla la aleatoriedad
            const n1 = getRandomInt(range.min1, range.max1);
            const n2 = getRandomInt(range.min2, range.max2);
            return { n1, op: '+', n2, result: n1 + n2 };
        }

        function resetScore() {
            okCount = 0;
            failCount = 0;
            okCountEl.textContent = '0';
            failCountEl.textContent = '0';
        }

        function initGame() {
            selectedCol1 = null;
            selectedOp = null;
            selectedCol3 = null;
            
            feedbackEl.textContent = "Select a number from the left";
            feedbackEl.className = "feedback-box";
            nextBtn.disabled = true;
            
            generateLevel();
        }

        function restartGame() {
            resetScore();
            initGame();
        }

        function closeGame() {
            document.body.innerHTML = '';
            document.body.style.backgroundColor = '#000';
            if (window.opener || window.history.length > 1) {
                window.close();
            }
        }

        function generateLevel() {
            matrixEl.innerHTML = '';
            const range = getDigitRange();
            
            // 1. Generar la solución garantizada (n1, op, n2, result)
            const solution = generateGuaranteedSolution(range);
            targetValue = solution.result;
            
            // 2. Definir los 4 operadores únicos
            let allOperators = ['+', '-', '×', '/'];
            
            // 3. Elegir en qué fila irá la solución correcta
            const solutionRow = getRandomInt(0, 3);
            
            // 4. Asignar el operador correcto a esa fila y eliminarlo de la lista
            const rowOperators = new Array(4);
            rowOperators[solutionRow] = solution.op;
            
            // Filtrar el operador usado para no repetirlo
            const remainingOps = allOperators.filter(op => op !== solution.op);
            
            // Mezclar los operadores restantes
            shuffleArray(remainingOps);
            
            // Rellenar las filas vacías con los operadores restantes
            let remIndex = 0;
            for (let i = 0; i < 4; i++) {
                if (i !== solutionRow) {
                    rowOperators[i] = remainingOps[remIndex];
                    remIndex++;
                }
            }

            // 5. Generar números aleatorios para las columnas 1 y 3
            const col1Data = Array.from({length: 4}, () => getRandomInt(range.min1, range.max1));
            const col3Data = Array.from({length: 4}, () => getRandomInt(range.min2, range.max2));
            
            // 6. Forzar los números de la solución en la fila correcta
            col1Data[solutionRow] = solution.n1;
            col3Data[solutionRow] = solution.n2;
            
            targetEl.textContent = targetValue;

            // Renderizar matriz
            for (let r = 0; r < 4; r++) {
                createCell(col1Data[r], 'col1', r);
                createCell(rowOperators[r], 'col2', r); // Usamos los operadores únicos
                createCell(col3Data[r], 'col3', r);
            }
        }

        function createCell(value, type, rowIndex) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.textContent = value;
            cell.dataset.type = type;
            cell.dataset.value = value;
            cell.dataset.row = rowIndex;

            if (type === 'col2') {
                cell.classList.add('col-operators');
            }

            cell.addEventListener('click', () => handleCellClick(cell, type, value));
            matrixEl.appendChild(cell);
        }

        function handleCellClick(cell, type, value) {
            if (nextBtn.disabled === false && feedbackEl.textContent !== "Select a number from the left") {
                return;
            }

            if (type === 'col1') {
                if (selectedCol1 && selectedCol1.element !== cell) {
                    selectedCol1.element.classList.remove('selected');
                }
                selectedCol1 = { element: cell, value: parseFloat(value) };
                cell.classList.add('selected');
                
                if (selectedOp) { selectedOp.element.classList.remove('selected'); selectedOp = null; }
                if (selectedCol3) { selectedCol3.element.classList.remove('selected'); selectedCol3 = null; }

                feedbackEl.textContent = "Now select an operator";
            } 
            else if (type === 'col2') {
                if (!selectedCol1) {
                    feedbackEl.textContent = "Select a number from the left first";
                    return;
                }
                if (selectedOp && selectedOp.element !== cell) {
                    selectedOp.element.classList.remove('selected');
                }
                selectedOp = { element: cell, value: value };
                cell.classList.add('selected');
                
                if (selectedCol3) { selectedCol3.element.classList.remove('selected'); selectedCol3 = null; }

                feedbackEl.textContent = "Now select the last number";
            } 
            else if (type === 'col3') {
                if (!selectedCol1 || !selectedOp) {
                    feedbackEl.textContent = "Complete the sequence from left to right";
                    return;
                }
                if (selectedCol3 && selectedCol3.element !== cell) {
                    selectedCol3.element.classList.remove('selected');
                }
                selectedCol3 = { element: cell, value: parseFloat(value) };
                cell.classList.add('selected');
                checkResult();
            }
        }

        function checkResult() {
            const result = calculate(selectedCol1.value, selectedOp.value, selectedCol3.value);
            const cellsToMark = [selectedCol1.element, selectedOp.element, selectedCol3.element];

            if (result === targetValue) {
                cellsToMark.forEach(c => {
                    c.classList.remove('selected');
                    c.classList.add('correct');
                });
                feedbackEl.textContent = "Good Job";
                feedbackEl.className = "feedback-box feedback-good";
                okCount++;
                okCountEl.textContent = okCount;
                nextBtn.disabled = false;
            } else {
                cellsToMark.forEach(c => {
                    c.classList.remove('selected');
                    c.classList.add('wrong');
                });
                feedbackEl.textContent = "Try next";
                feedbackEl.className = "feedback-box feedback-try";
                failCount++;
                failCountEl.textContent = failCount;
                nextBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
